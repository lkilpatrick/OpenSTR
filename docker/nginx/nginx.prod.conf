worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 15m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Detect local network clients (adjust to your LAN subnet)
    geo $is_local {
        default         0;
        192.168.0.0/16  1;
        10.0.0.0/8      1;
        172.16.0.0/12   1;
        127.0.0.0/8     1;
        100.64.0.0/10   1;  # Tailscale CGNAT range
    }

    upstream api_backend {
        server api:3000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certs — mounted via docker volume
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Network check endpoint — mobile app calls this to detect local vs remote
        location = /network-check {
            default_type application/json;
            return 200 '{"is_local":$is_local}';
        }

        # Auth endpoints — stricter rate limit
        # /api/auth/ for admin panel, /auth/ for mobile app (no /api prefix)
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Is-Local $is_local;
        }

        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            rewrite ^/auth/(.*)$ /api/auth/$1 break;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Is-Local $is_local;
        }

        # API routes — proxy directly to backend (no prefix stripping)
        # Matches all Express route mounts: /sessions, /properties, /users, etc.
        location ~ ^/(sessions|properties|users|ical|webhook|notifications|issues|messages|admin/cleaners|guest|standards|health|photos)(/|$) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Is-Local $is_local;
            proxy_cache_bypass $http_upgrade;
        }

        # Cleaner mobile web app
        location /app/ {
            alias /usr/share/nginx/mobile/;
            index index.html;
            try_files $uri $uri/ @mobile_fallback;
        }

        location @mobile_fallback {
            root /usr/share/nginx/mobile;
            rewrite ^ /index.html break;
        }

        # Admin panel (default — SPA catch-all)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
