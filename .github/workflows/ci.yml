name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openstr_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: openstr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (api)
        run: npm run build --workspace=api

      - name: TypeScript type-check (admin)
        working-directory: admin
        run: npx tsc --noEmit

      - name: Lint (api)
        run: npm run lint --workspace=api --if-present

      - name: Lint (admin)
        run: npm run lint --workspace=admin --if-present

      - name: Run API tests
        working-directory: api
        env:
          DATABASE_URL: postgres://openstr_test:test_password@localhost:5432/openstr_test
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test
        run: npm test
